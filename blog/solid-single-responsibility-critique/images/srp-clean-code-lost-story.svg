<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">کد تمیزی که تصمیم اصلی‌اش گم شده</title>
  <desc id="desc">چند پوشه‌ی مرتب با نام‌های Validator و Policy و Factory و Service، درحالی‌که نخ قرمز تصمیم اصلی بین آن‌ها پاره شده است.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font:700 42px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; direction:rtl; unicode-bidi:bidi-override;}
      .sub{font:500 24px system-ui, -apple-system, Segoe UI, sans-serif; fill:#334155; direction:rtl; unicode-bidi:bidi-override;}
      .label{font:700 26px ui-monospace, SFMono-Regular, Menlo, monospace; fill:#1e293b;}
      .small{font:500 18px system-ui, -apple-system, Segoe UI, sans-serif; fill:#475569; direction:rtl; unicode-bidi:bidi-override;}
    </style>
  </defs>
  <rect width="1400" height="800" rx="0" fill="url(#bg)"/>
  <text x="1180" y="90" class="title" text-anchor="middle">همه‌چیز مرتب است؛ تصمیم اصلی کجاست؟</text>
  <text x="1180" y="130" class="sub" text-anchor="middle">وقتی رفتار دامنه بین نقش‌های فنی پخش می‌شود</text>

  <g transform="translate(115,210)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="22" fill="#ffffff"/>
    <rect x="0" y="0" width="250" height="34" rx="22" fill="#fed7aa"/>
    <text x="125" y="75" class="label" text-anchor="middle">Validator</text>
  </g>
  <g transform="translate(410,210)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="22" fill="#ffffff"/>
    <rect x="0" y="0" width="250" height="34" rx="22" fill="#bae6fd"/>
    <text x="125" y="75" class="label" text-anchor="middle">Policy</text>
  </g>
  <g transform="translate(705,210)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="22" fill="#ffffff"/>
    <rect x="0" y="0" width="250" height="34" rx="22" fill="#ddd6fe"/>
    <text x="125" y="75" class="label" text-anchor="middle">Factory</text>
  </g>
  <g transform="translate(1000,210)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="22" fill="#ffffff"/>
    <rect x="0" y="0" width="250" height="34" rx="22" fill="#bbf7d0"/>
    <text x="125" y="75" class="label" text-anchor="middle">Service</text>
  </g>

  <path d="M220 460 C330 390, 430 540, 545 465" stroke="#ef4444" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="85 35"/>
  <path d="M575 465 C700 395, 825 535, 945 460" stroke="#ef4444" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="85 35"/>
  <path d="M980 460 C1050 430, 1110 440, 1180 500" stroke="#ef4444" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="45 40"/>

  <circle cx="565" cy="463" r="18" fill="#ef4444"/>
  <circle cx="962" cy="462" r="18" fill="#ef4444"/>
  <text x="700" y="610" class="title" text-anchor="middle">نخ تصمیم پاره شده است</text>
  <text x="700" y="655" class="small" text-anchor="middle">ظاهر تمیز است، اما خواننده باید تصمیم واحد را از چند تکه دوباره بسازد.</text>
</svg>
