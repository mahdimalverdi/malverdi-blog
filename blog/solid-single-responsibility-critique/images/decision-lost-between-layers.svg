<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">شرط ساده‌ای که بین کلاس‌های تمیز گم شد</title>
  <desc id="desc">مقایسه‌ی یک مسیر مستقیم تصمیم‌گیری با مسیری که تصمیم بین Validator و Policy و Factory و تست پخش شده است.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .h{font:800 36px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; direction:rtl; unicode-bidi:bidi-override;}
      .t{font:600 24px system-ui, -apple-system, Segoe UI, sans-serif; fill:#1e293b; direction:rtl; unicode-bidi:bidi-override;}
      .s{font:500 18px system-ui, -apple-system, Segoe UI, sans-serif; fill:#475569; direction:rtl; unicode-bidi:bidi-override;}
      .code{font:700 22px ui-monospace, SFMono-Regular, Menlo, monospace; fill:#0f172a;}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="redarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="700" y="72" text-anchor="middle" class="h">شرط ساده‌ای که بین کلاس‌های تمیز گم شد</text>

  <g transform="translate(80,130)">
    <rect x="0" y="0" width="570" height="540" rx="28" fill="#ffffff" filter="url(#shadow)"/>
    <text x="505" y="55" text-anchor="end" class="t">مسیر خوانا</text>
    <text x="505" y="90" text-anchor="end" class="s">تصمیم اصلی در جریان رفتار دیده می‌شود</text>
    <rect x="105" y="165" width="360" height="82" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
    <text x="285" y="217" text-anchor="middle" class="code">amount &gt;= 50_000</text>
    <path d="M285 255 L285 335" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="105" y="350" width="360" height="82" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="285" y="402" text-anchor="middle" class="code">NeedsExtraCheck()</text>
    <text x="285" y="485" text-anchor="middle" class="s">خواننده همان‌جا می‌فهمد قانون کجاست.</text>
  </g>

  <g transform="translate(750,130)">
    <rect x="0" y="0" width="570" height="540" rx="28" fill="#ffffff" filter="url(#shadow)"/>
    <text x="505" y="55" text-anchor="end" class="t">مسیر پخش‌شده</text>
    <text x="505" y="90" text-anchor="end" class="s">تصمیم واحد بین چند نقش فنی تقسیم شده است</text>
    <rect x="45" y="135" width="210" height="70" rx="16" fill="#ffedd5" stroke="#fb923c" stroke-width="3"/>
    <text x="150" y="178" text-anchor="middle" class="code">Validator</text>
    <rect x="315" y="135" width="210" height="70" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
    <text x="420" y="178" text-anchor="middle" class="code">Policy</text>
    <rect x="45" y="285" width="210" height="70" rx="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
    <text x="150" y="328" text-anchor="middle" class="code">Factory</text>
    <rect x="315" y="285" width="210" height="70" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <text x="420" y="328" text-anchor="middle" class="code">Test Mock</text>
    <path d="M255 170 L315 170" stroke="#dc2626" stroke-width="5" marker-end="url(#redarrow)"/>
    <path d="M420 205 L420 285" stroke="#dc2626" stroke-width="5" marker-end="url(#redarrow)"/>
    <path d="M315 320 L255 320" stroke="#dc2626" stroke-width="5" marker-end="url(#redarrow)"/>
    <path d="M150 285 L150 205" stroke="#dc2626" stroke-width="5" marker-end="url(#redarrow)"/>
    <text x="285" y="450" text-anchor="middle" class="s">تصمیم وجود دارد، اما مالک روشن ندارد.</text>
  </g>
</svg>
