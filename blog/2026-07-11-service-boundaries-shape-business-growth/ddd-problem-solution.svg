<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">رابطه‌ی فضای مسئله و فضای راه‌حل در طراحی دامنه‌محور</title>
  <desc id="desc">زیر‌دامنه‌ها در فضای مسئله شناسایی می‌شوند و زمینه‌های محدود در فضای راه‌حل، مدل‌های منسجم آن‌ها را شکل می‌دهند.</desc>
  <rect width="1600" height="760" rx="40" fill="#f8f2e7"/>
  <g font-family="Vazirmatn, Tahoma, sans-serif">
    <text x="800" y="70" text-anchor="middle" direction="rtl" font-size="38" font-weight="700" fill="#153d4d">کسب‌وکار را تحلیل می‌کنیم؛ سپس مرز راه‌حل را می‌سازیم</text>

    <rect x="80" y="125" width="620" height="540" rx="36" fill="#fffaf2" stroke="#d8c6b3" stroke-width="3"/>
    <text x="390" y="185" text-anchor="middle" direction="rtl" font-size="29" font-weight="700" fill="#a05339">فضای مسئله</text>
    <text x="390" y="220" text-anchor="middle" direction="rtl" font-size="20" fill="#746a64">کسب‌وکار چه قابلیت‌ها و قواعدی دارد؟</text>
    <rect x="135" y="270" width="510" height="315" rx="32" fill="#f3e3d5" stroke="#d87645" stroke-width="4"/>
    <text x="390" y="320" text-anchor="middle" direction="rtl" font-size="25" font-weight="700" fill="#7f432f">دامنه‌ی اعتبار</text>
    <g text-anchor="middle" direction="rtl" font-size="22" font-weight="700" fill="#643c2f">
      <rect x="190" y="355" width="400" height="56" rx="17" fill="#fffaf2"/><text x="390" y="391">زیر‌دامنه‌ی اعتباردهی</text>
      <rect x="190" y="430" width="400" height="56" rx="17" fill="#fffaf2"/><text x="390" y="466">زیر‌دامنه‌ی وثیقه</text>
      <rect x="190" y="505" width="400" height="56" rx="17" fill="#fffaf2"/><text x="390" y="541">زیر‌دامنه‌ی تسویه</text>
    </g>

    <path d="M730 395H865" stroke="#557d78" stroke-width="9" stroke-linecap="round"/>
    <path d="M840 374l32 21-32 21" fill="none" stroke="#557d78" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="800" y="365" text-anchor="middle" direction="rtl" font-size="19" fill="#55706d">مدل‌سازی و انتخاب مرز</text>

    <rect x="900" y="125" width="620" height="540" rx="36" fill="#fffaf2" stroke="#b8d0c7" stroke-width="3"/>
    <text x="1210" y="185" text-anchor="middle" direction="rtl" font-size="29" font-weight="700" fill="#17685f">فضای راه‌حل</text>
    <text x="1210" y="220" text-anchor="middle" direction="rtl" font-size="20" fill="#60746f">مدل در کجا معنای منسجم دارد؟</text>
    <g text-anchor="middle" direction="rtl" font-size="22" font-weight="700" fill="#174f4a">
      <rect x="960" y="275" width="500" height="105" rx="27" fill="#e1eee8" stroke="#17685f" stroke-width="4"/><text x="1210" y="337">زمینه‌ی محدود اعتبار</text>
      <rect x="960" y="405" width="500" height="105" rx="27" fill="#e1eee8" stroke="#17685f" stroke-width="4"/><text x="1210" y="467">زمینه‌ی محدود وثیقه</text>
      <rect x="960" y="535" width="500" height="105" rx="27" fill="#e1eee8" stroke="#17685f" stroke-width="4"/><text x="1210" y="597">زمینه‌ی محدود تسویه</text>
    </g>
    <path d="M1210 380v25M1210 510v25" stroke="#557d78" stroke-width="6" stroke-dasharray="8 8"/>

    <text x="800" y="718" text-anchor="middle" direction="rtl" font-size="21" font-weight="600" fill="#4f6567">زیر‌دامنه مسئله را توصیف می‌کند؛ زمینه‌ی محدود، انسجام مدل راه‌حل را.</text>
  </g>
</svg>
