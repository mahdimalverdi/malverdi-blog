<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">مقایسه‌ی شعاع تغییر در دو نوع مرزبندی</title>
  <desc id="desc">در مرزبندی فنی یک تغییر کسب‌وکار از چند سرویس و تیم عبور می‌کند؛ در مرزبندی دامنه‌محور تغییر عمدتاً داخل یک زمینه باقی می‌ماند.</desc>
  <rect width="1600" height="820" rx="40" fill="#f8f2e7"/>
  <g font-family="Vazirmatn, Tahoma, sans-serif">
    <text x="800" y="74" text-anchor="middle" direction="rtl" font-size="39" font-weight="700" fill="#153d4d">یک تغییر، دو مسیر متفاوت</text>
    <text x="800" y="116" text-anchor="middle" direction="rtl" font-size="22" fill="#60747b">مرز مناسب، شعاع تغییر و هزینه‌ی هماهنگی را محدود می‌کند</text>

    <rect x="70" y="160" width="700" height="570" rx="34" fill="#fffaf2" stroke="#d9caba" stroke-width="3"/>
    <text x="420" y="218" text-anchor="middle" direction="rtl" font-size="28" font-weight="700" fill="#9d4e38">مرزبندی فنی</text>
    <text x="420" y="252" text-anchor="middle" direction="rtl" font-size="20" fill="#7b6d64">تغییر از چند مرز عبور می‌کند</text>

    <rect x="116" y="295" width="188" height="70" rx="22" fill="#d87645"/>
    <text x="210" y="339" text-anchor="middle" direction="rtl" font-size="22" font-weight="700" fill="#fffaf2">روش بازپرداخت</text>
    <path d="M304 330H350" stroke="#d87645" stroke-width="8" stroke-linecap="round"/>
    <path d="M338 317l20 13-20 13" fill="none" stroke="#d87645" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

    <g font-size="21" font-weight="700" fill="#153d4d" text-anchor="middle" direction="rtl">
      <rect x="360" y="285" width="160" height="90" rx="22" fill="#e8eee9" stroke="#5d817d" stroke-width="3"/><text x="440" y="338">قرارداد</text>
      <rect x="548" y="285" width="160" height="90" rx="22" fill="#e8eee9" stroke="#5d817d" stroke-width="3"/><text x="628" y="338">کیف پول</text>
      <rect x="360" y="420" width="160" height="90" rx="22" fill="#e8eee9" stroke="#5d817d" stroke-width="3"/><text x="440" y="473">تراکنش</text>
      <rect x="548" y="420" width="160" height="90" rx="22" fill="#e8eee9" stroke="#5d817d" stroke-width="3"/><text x="628" y="473">گزارش</text>
    </g>
    <path d="M520 330H548M440 375V420M628 375V420M520 465H548" fill="none" stroke="#c35d3d" stroke-width="6" stroke-dasharray="10 10"/>
    <g fill="#c35d3d"><circle cx="534" cy="330" r="7"/><circle cx="440" cy="397" r="7"/><circle cx="628" cy="397" r="7"/><circle cx="534" cy="465" r="7"/></g>
    <text x="420" y="579" text-anchor="middle" direction="rtl" font-size="21" fill="#7b6d64">چهار مالک · چند قرارداد · انتشارهای وابسته</text>
    <g transform="translate(275 620)">
      <circle cx="0" cy="0" r="19" fill="#c35d3d"/><circle cx="47" cy="0" r="19" fill="#c35d3d"/><circle cx="94" cy="0" r="19" fill="#c35d3d"/><circle cx="141" cy="0" r="19" fill="#c35d3d"/>
      <path d="M19 0h9M66 0h9M113 0h9" stroke="#c35d3d" stroke-width="5" stroke-dasharray="4 5"/>
    </g>

    <rect x="830" y="160" width="700" height="570" rx="34" fill="#fffaf2" stroke="#b9d0c7" stroke-width="3"/>
    <text x="1180" y="218" text-anchor="middle" direction="rtl" font-size="28" font-weight="700" fill="#17685f">مرزبندی دامنه‌محور</text>
    <text x="1180" y="252" text-anchor="middle" direction="rtl" font-size="20" fill="#60746f">تغییر عمدتاً داخل یک زمینه می‌ماند</text>

    <rect x="876" y="295" width="188" height="70" rx="22" fill="#d87645"/>
    <text x="970" y="339" text-anchor="middle" direction="rtl" font-size="22" font-weight="700" fill="#fffaf2">روش بازپرداخت</text>
    <path d="M1064 330H1108" stroke="#d87645" stroke-width="8" stroke-linecap="round"/>
    <path d="M1096 317l20 13-20 13" fill="none" stroke="#d87645" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1120" y="278" width="345" height="330" rx="42" fill="#e1eee8" stroke="#17685f" stroke-width="5"/>
    <text x="1292" y="330" text-anchor="middle" direction="rtl" font-size="27" font-weight="700" fill="#153d4d">زمینه‌ی بازپرداخت</text>
    <g font-size="21" fill="#315d59" text-anchor="middle" direction="rtl">
      <rect x="1170" y="365" width="245" height="54" rx="17" fill="#fffaf2"/><text x="1292" y="400">قواعد بازپرداخت</text>
      <rect x="1170" y="438" width="245" height="54" rx="17" fill="#fffaf2"/><text x="1292" y="473">داده و وضعیت</text>
      <rect x="1170" y="511" width="245" height="54" rx="17" fill="#fffaf2"/><text x="1292" y="546">فرایند و خطا</text>
    </g>
    <path d="M1465 443h38" stroke="#17685f" stroke-width="6" stroke-dasharray="8 8"/>
    <circle cx="1510" cy="443" r="12" fill="#17685f"/>
    <text x="1180" y="655" text-anchor="middle" direction="rtl" font-size="21" fill="#60746f">یک مالک · تغییر محلی · خروجی‌های ضروری</text>
  </g>
</svg>
