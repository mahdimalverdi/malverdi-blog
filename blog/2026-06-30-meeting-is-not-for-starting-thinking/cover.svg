<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">جلسه جای شروع فکر کردن نیست</title>
  <desc id="desc">تصویر مفهومی از تبدیل جلسه‌ی بی‌خروجی به چرخه‌ی نوشتن، ریویو و تصمیم</desc>
  <rect width="1200" height="630" fill="#f8f5ef"/>
  <rect x="70" y="70" width="1060" height="490" rx="42" fill="#ffffff" stroke="#d9d1c3" stroke-width="3"/>
  <text x="600" y="150" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="52" font-weight="700" fill="#2f2a24">جلسه جای شروع فکر کردن نیست</text>
  <text x="600" y="205" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="28" fill="#5b5147">اول مسئله را بنویسیم، بعد ریویو کنیم، بعد جلسه بگذاریم</text>

  <g transform="translate(155 285)">
    <rect x="0" y="0" width="210" height="110" rx="22" fill="#f2eee6" stroke="#c8bdad" stroke-width="2"/>
    <text x="105" y="50" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="26" font-weight="700" fill="#2f2a24">نوشتن مسئله</text>
    <text x="105" y="82" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="18" fill="#6d6257">شواهد، اثر، گزینه‌ها</text>
  </g>

  <g transform="translate(495 285)">
    <rect x="0" y="0" width="210" height="110" rx="22" fill="#f2eee6" stroke="#c8bdad" stroke-width="2"/>
    <text x="105" y="50" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="26" font-weight="700" fill="#2f2a24">ریویوی تیمی</text>
    <text x="105" y="82" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="18" fill="#6d6257">ابهام، مخالفت، تکمیل</text>
  </g>

  <g transform="translate(835 285)">
    <rect x="0" y="0" width="210" height="110" rx="22" fill="#f2eee6" stroke="#c8bdad" stroke-width="2"/>
    <text x="105" y="50" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="26" font-weight="700" fill="#2f2a24">جلسه تصمیم</text>
    <text x="105" y="82" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="18" fill="#6d6257">مالک اقدام، زمان پیگیری</text>
  </g>

  <path d="M382 340 H468" stroke="#8b8175" stroke-width="4" stroke-linecap="round"/>
  <path d="M456 327 L471 340 L456 353" fill="none" stroke="#8b8175" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M722 340 H808" stroke="#8b8175" stroke-width="4" stroke-linecap="round"/>
  <path d="M796 327 L811 340 L796 353" fill="none" stroke="#8b8175" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="600" y="485" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="24" fill="#4a4037">جلسه باید ادامه‌ی فکر کردن باشد، نه شروع آن.</text>
</svg>
