<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">چرخه نوشتن، ریویو، جلسه و پیگیری</title>
  <desc id="desc">دیاگرام ساده برای فرایند مکتوب کردن مسئله قبل از جلسه</desc>
  <rect width="1000" height="360" rx="24" fill="#fbfaf7"/>
  <g font-family="Tahoma, Arial, sans-serif" direction="rtl" unicode-bidi="plaintext">
    <g transform="translate(55 115)">
      <rect width="170" height="92" rx="18" fill="#ffffff" stroke="#d8d0c5" stroke-width="2"/>
      <text x="85" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#2f2a24">مسئله‌نویسی</text>
      <text x="85" y="70" text-anchor="middle" font-size="15" fill="#6f655b">مشکل، شواهد، اثر</text>
    </g>
    <g transform="translate(290 115)">
      <rect width="170" height="92" rx="18" fill="#ffffff" stroke="#d8d0c5" stroke-width="2"/>
      <text x="85" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#2f2a24">ریویو</text>
      <text x="85" y="70" text-anchor="middle" font-size="15" fill="#6f655b">ابهام، نظر، مخالفت</text>
    </g>
    <g transform="translate(525 115)">
      <rect width="170" height="92" rx="18" fill="#ffffff" stroke="#d8d0c5" stroke-width="2"/>
      <text x="85" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#2f2a24">جلسه تصمیم</text>
      <text x="85" y="70" text-anchor="middle" font-size="15" fill="#6f655b">جمع‌بندی و انتخاب</text>
    </g>
    <g transform="translate(760 115)">
      <rect width="170" height="92" rx="18" fill="#ffffff" stroke="#d8d0c5" stroke-width="2"/>
      <text x="85" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#2f2a24">پیگیری</text>
      <text x="85" y="70" text-anchor="middle" font-size="15" fill="#6f655b">مالک، زمان، سنجه</text>
    </g>
  </g>
  <g stroke="#8b8175" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M238 161 H272"/>
    <path d="M262 151 L274 161 L262 171"/>
    <path d="M473 161 H507"/>
    <path d="M497 151 L509 161 L497 171"/>
    <path d="M708 161 H742"/>
    <path d="M732 151 L744 161 L732 171"/>
  </g>
  <text x="500" y="280" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="Tahoma, Arial, sans-serif" font-size="22" fill="#4a4037">هر مرحله باید خروجی مرحله‌ی بعد را آماده کند.</text>
</svg>
